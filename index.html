    // ─────────────────────────────────────────────
    const EPOCH = new Date('2024-01-01T00:00:00');

    function getDaysSinceEpoch() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      return Math.floor((today - EPOCH) / 86400000);
    }

    function getDailyPuzzleIndex() {
      return getDaysSinceEpoch() % PUZZLES.length;
    }

    function getPuzzleNumber() {
      return getDaysSinceEpoch() + 1;
    }

    function getTodayKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getYesterdayKey() {
      const now = new Date();
      const yesterday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
      const y = yesterday.getFullYear();
      const m = String(yesterday.getMonth() + 1).padStart(2, '0');
      const d = String(yesterday.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    // ─────────────────────────────────────────────
    // LOCALSTORAGE UTILITIES
    // ─────────────────────────────────────────────
    const LS_STATS   = 'metamorphosis_stats';
    const LS_DONE    = (date) => `metamorphosis_done_${date}`;

    function loadStats() {
      try {
        const raw = localStorage.getItem(LS_STATS);
        if (!raw) return { gamesPlayed: 0, currentStreak: 0, maxStreak: 0, lastCompletedDate: null };
        return JSON.parse(raw);
      } catch { return { gamesPlayed: 0, currentStreak: 0, maxStreak: 0, lastCompletedDate: null }; }
    }

    function saveStats(s) {
      try { localStorage.setItem(LS_STATS, JSON.stringify(s)); } catch {}
    }

    function isCompletedToday() {
      try { return localStorage.getItem(LS_DONE(getTodayKey())) === 'true'; } catch { return false; }
    }

    function markCompletedToday() {
      try { localStorage.setItem(LS_DONE(getTodayKey()), 'true'); } catch {}
    }

    function computeNewStats(prev) {
      const today = getTodayKey();
      const yesterday = getYesterdayKey();
      const newStreak = prev.lastCompletedDate === yesterday || prev.lastCompletedDate === today
        ? (prev.lastCompletedDate === today ? prev.currentStreak : prev.currentStreak + 1)
        : 1;
      return {
        gamesPlayed: prev.lastCompletedDate === today ? prev.gamesPlayed : prev.gamesPlayed + 1,
        currentStreak: newStreak,
        maxStreak: Math.max(prev.maxStreak, newStreak),
        lastCompletedDate: today,
      };
    }

    // ─────────────────────────────────────────────
    // CONFETTI
    // ─────────────────────────────────────────────
    function launchConfetti(canvas) {
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      const COLORS = ['#8b5cf6','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899','#06b6d4','#f97316'];
      const particles = Array.from({ length: 160 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height * 0.5 - 10,
        vx: (Math.random() - 0.5) * 5,
        vy: Math.random() * 3 + 1,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        w: Math.random() * 10 + 5,
        h: Math.random() * 5 + 3,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.15,
        alpha: 1,
        shape: Math.random() > 0.45 ? 'rect' : 'circle',
      }));

      let raf;
      function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let anyAlive = false;
        for (const p of particles) {
          p.vy  += 0.06;
          p.vx  *= 0.992;
          p.x   += p.vx;
          p.y   += p.vy;
          p.rot += p.rotV;
          if (p.y > canvas.height * 0.75) p.alpha -= 0.02;
          if (p.alpha <= 0) continue;
          anyAlive = true;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          if (p.shape === 'rect') {
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
        if (anyAlive) {
          raf = requestAnimationFrame(frame);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      raf = requestAnimationFrame(frame);
      setTimeout(() => {
        cancelAnimationFrame(raf);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 7000);
    }

    // ─────────────────────────────────────────────
    // COUNTDOWN HOOK
    // ─────────────────────────────────────────────
    function useCountdown() {
      const [time, setTime] = useState('');
      useEffect(() => {
        function tick() {
          const now = new Date();
          const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
          const diff = midnight - now;
          const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
          const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
          const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
          setTime(`${h}:${m}:${s}`);
        }
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, []);
      return time;
    }

              <div className="flex items-center justify-between">
                <div>
                  <span className="font-bold text-xl tracking-widest text-metamorph-correct">

                  style={{ minHeight: '44px', minWidth: '52px' }}

            {/* LOCKED MODE */}

    // ─────────────────────────────────────────────
    // SUCCESS VIEW
    // ─────────────────────────────────────────────
    function SuccessView({ puzzle, hintUsed, puzzleNumber, stats, onShowStats, isGivenUp, solvedCount }) {
      const [copied, setCopied] = useState(false);
      const countdown = useCountdown();

      function buildShareText() {
        if (isGivenUp) {
          const guessed = solvedCount - 1; // first word is free
          const total = puzzle.words.length - 1;
          const icons = puzzle.words.slice(1).map((_, i) => i < guessed ? (hintUsed[i + 1] ? '🌱' : '✅') : '❌');
          return [
            `Metamorphosis #${puzzleNumber} 🏳️`,
            `${icons.join('')} ${guessed}/${total} gave up`,
            ``,
            `The daily word chain puzzle`,
          ].join('\n');
        }
        const icons = puzzle.words.slice(1).map((_, i) => hintUsed[i + 1] ? '🌱' : '✅');
        return [
          `Metamorphosis #${puzzleNumber} 🦋`,
          `${icons.join('')} ${puzzle.words.length - 1}/${puzzle.words.length - 1}`,
          ``,
          `The daily word chain puzzle`,
        ].join('\n');
      }

      function handleShare() {
        const text = buildShareText();
        if (navigator.share) {
          navigator.share({ text }).catch(() => {});
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2500);
          }).catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        const el = document.createElement('textarea');
        el.value = text;
        el.style.position = 'fixed';
        el.style.top = '-9999px';
        document.body.appendChild(el);
        el.focus(); el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      }

      const statItems = [
        { v: stats.gamesPlayed, l: 'Played' },
        { v: stats.currentStreak, l: 'Streak 🔥' },
        { v: stats.maxStreak, l: 'Best 🏆' },

      return (
        <div className="flex flex-col items-center gap-5 py-6 text-center w-full anim-fade-in">

              <>
                <h2 className="text-2xl font-bold text-metamorph-muted">Answers Revealed</h2>

              <>
                <h2 className="text-2xl font-bold text-metamorph-correct">Metamorphosed!</h2>
                <p className="text-metamorph-muted text-sm mt-1">You completed <strong className="text-metamorph-text">{puzzle.title}</strong></p>
              </>
            )}
          </div>

          {/* Word chain summary */}
          <div className="w-full bg-white border-2 border-metamorph-border rounded-2xl p-4 flex flex-col gap-2 shadow-sm">
            <p className="text-xs text-metamorph-muted uppercase tracking-widest font-semibold mb-1">The Chain</p>
            {puzzle.words.map((word, i) => {
              const wasGuessed = i < solvedCount;
              const wasRevealed = isGivenUp && !wasGuessed;
              const iconEl = i === 0 ? '🟢'
                : wasRevealed ? '❌'
                : hintUsed[i] ? '🌱'
                : '✅';
              const wordColor = wasRevealed

                  <span className="text-base font-mono font-bold flex-shrink-0 w-5 mt-0.5">{iconEl}</span>
                  <div className="flex-1 min-w-0">
                    <span className={`font-bold tracking-widest text-sm ${wordColor}`}>{word}</span>
                    {i < puzzle.words.length - 1 && (
                      <p className="text-xs text-metamorph-muted italic truncate">↳ {puzzle.transformations[i]}</p>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Stats row */}
          <div className="grid grid-cols-3 gap-3 w-full">
            {statItems.map(({ v, l }) => (
              <div key={l} className="flex flex-col items-center bg-white border-2 border-metamorph-border rounded-xl py-3 gap-1 shadow-sm">
                <span className="text-2xl font-bold text-metamorph-accent leading-none">{v}</span>
                <span className="text-xs text-metamorph-muted">{l}</span>
              </div>
            ))}
          </div>

          {/* Share button */}
          <button
            onClick={handleShare}
            className="w-full py-3.5 rounded-xl bg-metamorph-accent hover:opacity-90 active:scale-95 text-white font-bold text-base transition-all shadow-lg"
            style={{ minHeight: '52px' }}
          >
            {copied ? '✓ Copied to clipboard!' : 'Share Result 🦋'}
          </button>

          {/* Countdown */}
          <div className="flex flex-col items-center gap-1 text-center">
            <p className="text-metamorph-muted text-xs uppercase tracking-widest font-semibold">Next puzzle in</p>
            <span className="text-2xl font-mono font-bold text-metamorph-accent tabular-nums">{countdown}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // HEADER
    // ─────────────────────────────────────────────
    function Header({ puzzleNumber, onHowToPlay, onStats }) {
      return (
        <header className="w-full border-b-2 border-metamorph-border bg-metamorph-card sticky top-0 z-10">
          <div className="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <button
              onClick={onHowToPlay}
              className="text-metamorph-muted hover:text-metamorph-text text-sm font-medium transition-colors"
              style={{ minHeight: '44px', minWidth: '44px' }}
              aria-label="How to play"
            >
              Help
            </button>
            <div className="text-center">
              <div className="flex items-center gap-2 justify-center">
                <span className="anim-flutter inline-block text-xl" aria-hidden="true">🦋</span>
                <h1 className="font-bold text-lg tracking-wide text-metamorph-accent">Metamorphosis</h1>
              </div>
              <div className="text-xs text-metamorph-muted font-medium">Puzzle #{puzzleNumber}</div>
            </div>
            <button
              onClick={onStats}
              className="text-metamorph-muted hover:text-metamorph-text text-sm font-medium transition-colors"
              style={{ minHeight: '44px', minWidth: '44px' }}
              aria-label="View statistics"
            >
              Stats
            </button>
          </div>
        </header>
      );
    }

    // ─────────────────────────────────────────────
    // APP
    // ─────────────────────────────────────────────
    function App() {
      const puzzleIndex = getDailyPuzzleIndex();
      const puzzleNumber = getPuzzleNumber();
      const currentPuzzle = PUZZLES[puzzleIndex];

      const [solvedCount, setSolvedCount]       = useState(1);
      const [inputValue, setInputValue]         = useState('');
      const [feedbackState, setFeedbackState]   = useState(null);
      const [hintUsed, setHintUsed]             = useState(() => new Array(currentPuzzle.words.length).fill(false));
      const [isComplete, setIsComplete]         = useState(false);
      const [showHowToPlay, setShowHowToPlay]   = useState(false);
      const [showStats, setShowStats]           = useState(false);
      const [showGiveUp, setShowGiveUp]         = useState(false);
      const [isGivenUp, setIsGivenUp]           = useState(false);
      const [stats, setStats]                   = useState(loadStats);
      const [alreadyCompleted, setAlreadyCompleted] = useState(isCompletedToday);
      const [confettiDone, setConfettiDone]     = useState(false);

      const canvasRef = useRef(null);
      const inputRef  = useRef(null);
      const feedbackTimerRef = useRef(null);

      // Auto-focus input when active word changes
      useEffect(() => {
        if (!isComplete && !alreadyCompleted && inputRef.current) {
          const t = setTimeout(() => {
            if (inputRef.current) {
              inputRef.current.focus();
              inputRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }, 160);
          return () => clearTimeout(t);
        }
      }, [solvedCount, isComplete, alreadyCompleted]);

      // Confetti on completion
      useEffect(() => {
        if (isComplete && !confettiDone) {
          setConfettiDone(true);
          setTimeout(() => launchConfetti(canvasRef.current), 300);
        }
      }, [isComplete]);

      // Hide loading screen once React is hydrated
      useEffect(() => {
        const el = document.getElementById('loading');
        if (el) {
          el.classList.add('hidden');
          setTimeout(() => el.remove(), 500);
        }
        // Show how-to-play for first-time users
        const seen = localStorage.getItem('metamorphosis_seen_help');
        if (!seen) {
          setShowHowToPlay(true);
          localStorage.setItem('metamorphosis_seen_help', 'true');
        }
      }, []);

      function handleSubmit() {
        const guess = inputValue.trim().toUpperCase();
        if (!guess) return;
        const target = currentPuzzle.words[solvedCount];
        if (!target) return;

        if (guess === target) {
          // Correct
          clearTimeout(feedbackTimerRef.current);
          setFeedbackState('correct');
          const next = solvedCount + 1;
          feedbackTimerRef.current = setTimeout(() => {
            setSolvedCount(next);
            setInputValue('');
            setFeedbackState(null);
            if (next >= currentPuzzle.words.length) {
              setIsComplete(true);
              markCompletedToday();
              const newStats = computeNewStats(stats);
              setStats(newStats);
              saveStats(newStats);
            }
          }, 280);
        } else {
          // Incorrect
          clearTimeout(feedbackTimerRef.current);
          setFeedbackState('incorrect');
          feedbackTimerRef.current = setTimeout(() => {
            setFeedbackState(null);
            setInputValue('');
          }, 650);
        }
      }

      function handleHint(wordIndex) {
        const updated = [...hintUsed];
        updated[wordIndex] = true;
        setHintUsed(updated);
      }

      function handleGiveUp() {
        setIsGivenUp(true);
        setShowGiveUp(false);
        setInputValue('');
        clearTimeout(feedbackTimerRef.current);
        setFeedbackState(null);
        markCompletedToday();
        // Give up: gamesPlayed++ but streak resets to 0
        const newStats = {
          gamesPlayed: stats.lastCompletedDate === getTodayKey() ? stats.gamesPlayed : stats.gamesPlayed + 1,
          currentStreak: 0,
          maxStreak: stats.maxStreak,
          lastCompletedDate: getTodayKey(),
        };
        setStats(newStats);
        saveStats(newStats);
      }

      const showModal = showHowToPlay || showStats || showGiveUp;

      return (
        <div className="min-h-screen bg-metamorph-bg text-metamorph-text flex flex-col">
          {/* Confetti canvas */}
          <canvas
            ref={canvasRef}
            style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 9999, pointerEvents: 'none' }}
            aria-hidden="true"
          />

          {/* Modals */}
          {showHowToPlay && <HowToPlayModal onClose={() => setShowHowToPlay(false)} />}
          {showStats && <StatsModal stats={stats} onClose={() => setShowStats(false)} />}
          {showGiveUp && <GiveUpModal onConfirm={handleGiveUp} onCancel={() => setShowGiveUp(false)} />}

          {/* Header */}
          <Header
            puzzleNumber={puzzleNumber}
            onHowToPlay={() => setShowHowToPlay(true)}
            onStats={() => setShowStats(true)}
          />

          {/* Main content */}
          <main className="flex-1 w-full max-w-lg mx-auto px-4 pt-4 pb-6">
            {alreadyCompleted ? (
              <AlreadyCompletedView puzzleNumber={puzzleNumber} stats={stats} />
            ) : isComplete ? (
              <SuccessView
                puzzle={currentPuzzle}
                hintUsed={hintUsed}
                puzzleNumber={puzzleNumber}
                stats={stats}
                onShowStats={() => setShowStats(true)}
                isGivenUp={false}
                solvedCount={solvedCount}
              />
            ) : isGivenUp ? (
              <>
                <PuzzleView
                  puzzle={currentPuzzle}
                  solvedCount={solvedCount}
                  inputValue=""
                  feedbackState={null}
                  hintUsed={hintUsed}
                  inputRef={null}
                  onInput={() => {}}
                  onSubmit={() => {}}
                  onHint={() => {}}
                  isGivenUp={true}
                  onGiveUp={() => {}}
                />
                <SuccessView
                  puzzle={currentPuzzle}
                  hintUsed={hintUsed}
                  puzzleNumber={puzzleNumber}
                  stats={stats}
                  onShowStats={() => setShowStats(true)}
                  isGivenUp={true}
                  solvedCount={solvedCount}
                />
              </>
            ) : (
              <PuzzleView
                puzzle={currentPuzzle}
                solvedCount={solvedCount}
                inputValue={inputValue}
                feedbackState={feedbackState}
                hintUsed={hintUsed}
                inputRef={inputRef}
                onInput={setInputValue}
                onSubmit={handleSubmit}
                onHint={handleHint}
                isGivenUp={false}
                onGiveUp={() => setShowGiveUp(true)}
              />
            )}
          </main>

          {/* Footer */}
          <Footer
            onHowToPlay={() => setShowHowToPlay(true)}
            onStats={() => setShowStats(true)}
          />
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // BOOTSTRAP
    // ─────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
